name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

      - name: Check migration file ordering
        run: |
          cd supabase/migrations
          prev=""
          for f in $(ls *.sql | sort); do
            if [ -n "$prev" ] && [[ "$f" < "$prev" ]]; then
              echo "ERROR: Migration $f is out of order (after $prev)"
              exit 1
            fi
            prev="$f"
          done
          echo "All $(ls *.sql | wc -l) migrations in correct order"

  # Database migration dry-run on PRs (requires Supabase CLI in CI)
