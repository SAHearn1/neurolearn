name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prune stale git worktrees
        run: git worktree prune

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test -- --run
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Check migration file ordering
        run: |
          cd supabase/migrations
          prev=""
          for f in $(ls *.sql | sort); do
            if [ -n "$prev" ] && [[ "$f" < "$prev" ]]; then
              echo "ERROR: Migration $f is out of order (after $prev)"
              exit 1
            fi
            prev="$f"
          done
          echo "All $(ls *.sql | wc -l) migrations in correct order"

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # E2E tests — runs when PLAYWRIGHT_RUN secret is set to 'true'
  # Required secrets: VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, E2E_LEARNER_EMAIL,
  #   E2E_LEARNER_PASSWORD, E2E_EDUCATOR_EMAIL, E2E_EDUCATOR_PASSWORD
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [validate]
    if: vars.PLAYWRIGHT_RUN == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Run E2E tests
        run: npm run test:e2e -- --project=chromium
        env:
          PLAYWRIGHT_RUN: 'true'
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          E2E_LEARNER_EMAIL: ${{ secrets.E2E_LEARNER_EMAIL }}
          E2E_LEARNER_PASSWORD: ${{ secrets.E2E_LEARNER_PASSWORD }}
          E2E_EDUCATOR_EMAIL: ${{ secrets.E2E_EDUCATOR_EMAIL }}
          E2E_EDUCATOR_PASSWORD: ${{ secrets.E2E_EDUCATOR_PASSWORD }}
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Database migrations — runs on main branch push only
  # Required secrets: SUPABASE_PROJECT_REF, SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD
  migrate:
    name: Database Migrations
    runs-on: ubuntu-latest
    needs: [validate, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.PLAYWRIGHT_RUN == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Run migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
